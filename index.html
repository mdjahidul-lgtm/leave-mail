<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathao Leave Mail Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; font-size: 22px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #444; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: #007bff; outline: none; }
        button { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; margin-top: 25px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .row { display: flex; gap: 10px; }
        .row .col { flex: 1; }
        
        .result-box { margin-top: 25px; background: #f8f9fa; border: 1px dashed #007bff; padding: 15px; border-radius: 8px; }
        .result-title { font-weight: bold; color: #333; margin-top: 10px; font-size: 13px; }
        .output-text { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; white-space: pre-wrap; word-break: break-all; font-size: 13px; color: #333; max-height: 150px; overflow-y: auto; }
        .copy-btn { background-color: #28a745; margin-top: 5px; padding: 6px 12px; font-size: 12px; width: auto; display: inline-block; }
        .copy-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Leave Mail Generator</h2>
    
    <label>ছুটির ধরন (Leave Type):</label>
    <select id="leaveType">
        <option value="Leave">Regular / Emergency Leave</option>
        <option value="LWP">LWP Leave</option>
    </select>

    <div class="row">
        <div class="col">
            <label>আপনার নাম (Name):</label>
            <input type="text" id="name" placeholder="Md. Saiful Islam">
        </div>
        <div class="col">
            <label>আইডি (ID):</label>
            <input type="text" id="empId" placeholder="C 4673">
        </div>
    </div>

    <label>লাইন ম্যানেজারের নাম (Line Manager Name):</label>
    <input type="text" id="managerName" value="Md. Junayed Mia">

    <div class="row">
        <div class="col">
            <label>ছুটি শুরু (Start Date):</label>
            <input type="text" id="startDate" placeholder="07 April 2026">
        </div>
        <div class="col">
            <label>ছুটি শেষ (End Date):</label>
            <input type="text" id="endDate" placeholder="08 April 2026">
        </div>
    </div>

    <label>দিনের সংখ্যা (Duration):</label>
    <input type="text" id="duration" placeholder="যেমন: 01 Day / 02 Days">

    <label>লিভ রিলীভারের নাম ও আইডি (Reliever Name & ID):</label>
    <input type="text" id="relieverName" placeholder="Md.Mehedi Hasan (C 2892)">

    <label>ছুটি নেওয়ার কারণ (আপনি যেভাবে ইচ্ছা বাংলিশে লিখুন):</label>
    <textarea id="reason" rows="3" placeholder="যেমন: petbethar karone office ashte pari ni"></textarea>

    <button onclick="generateMail()">Click Here to Generate Mail</button>

    <div class="result-box">
        <h3 style="margin-top:0; font-size: 16px; color: #007bff;">Generated Mail Preview</h3>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">(ফরম পূরণ করে উপরের বাটনে চাপ দিলে এখানে লেখা ভেসে উঠবে)</p>
        
        <div class="result-title">Subject:</div>
        <div id="outSubject" class="output-text">এখানে সাবজেক্ট আসবে...</div>
        <button class="copy-btn" onclick="copyTxt('outSubject')">Copy Subject</button>

        <div class="result-title">Mail Body:</div>
        <div id="outBody" class="output-text">এখানে মেইল বডি আসবে...</div>
        <button class="copy-btn" onclick="copyTxt('outBody')">Copy Body</button>
    </div>
</div>

<script>
function convertBanglishToEnglish(inputText) {
    var text = inputText.toLowerCase().replace(/[^a-z0-9]/g, ""); 
    
    if (text.includes("petbetha") || text.includes("petbethar") || text.includes("stomach")) {
        return "severe stomach ache";
    }
    if (text.includes("jor") || text.includes("jwor") || text.includes("fever")) {
        return "high fever";
    }
    if (text.includes("mathabetha") || text.includes("headache")) {
        return "a severe headache";
    }
    if (text.includes("bacchasick") || text.includes("bacchaoshustho") || text.includes("babysick")) {
        return "my child's sudden illness";
    }
    if (text.includes("familyproblem") || text.includes("paribarick") || text.includes("bashaybaje")) {
        return "an unexpected family emergency";
    }
    if (text.includes("dantbetha") || text.includes("toothache")) {
        return "an acute toothache";
    }
    if (text.includes("bajeobostha") || text.includes("oshustho") || text.includes("sick")) {
        return "sudden physical illness";
    }
    
    return inputText;
}

function generateMail() {
    var leaveTypeSelect = document.getElementById('leaveType').value;
    var name = document.getElementById('name').value.trim();
    var empId = document.getElementById('empId').value.trim();
    var managerName = document.getElementById('managerName').value.trim();
    var startDate = document.getElementById('startDate').value.trim();
    var endDate = document.getElementById('endDate').value.trim();
    var duration = document.getElementById('duration').value.trim();
    var relieverName = document.getElementById('relieverName').value.trim();
    var rawReason = document.getElementById('reason').value.trim();

    if(!name || !empId || !managerName || !startDate || !endDate || !duration || !relieverName || !rawReason) {
        alert("দয়া করে সব ঘর সঠিকভাবে পূরণ করুন!");
        return;
    }

    var reason = convertBanglishToEnglish(rawReason);

    var today = new Date();
    var day = String(today.getDate()).padStart(2, '0');
    var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    var month = months[today.getMonth()];
    var year = today.getFullYear();
    var autoCurrentDate = day + " " + month + " " + year;

    var toEmail = "ali@pathao.com"; 
    var ccEmails = "junayed@pathao.com,hr@pathao.com,shuvo@pathao.com,sabbir@pathao.com";

    var subjectLeaveType = "";
    var bodyLeaveType = "";
    
    if(leaveTypeSelect === "Leave") {
        subjectLeaveType = "Emergency Leave";
        bodyLeaveType = "Leave";
    } else {
        subjectLeaveType = "LWP Leave";
        bodyLeaveType = "LWP (Leave Without Pay)";
    }

    var subjectStr = "Leave Application || " + subjectLeaveType + " || " + empId + " || " + name + " || CISD || " + autoCurrentDate;
    
    var dateTextFirstLine = "";
    var dateTextDetailLine = "";
    
    if (startDate === endDate) {
        dateTextFirstLine = "on " + startDate;
        dateTextDetailLine = startDate;
    } else {
        dateTextFirstLine = "from " + startDate + " to " + endDate;
        dateTextDetailLine = startDate + " to " + endDate;
    }
    
    // মেইল বডির নিচের লাইনে 'Reason for leave: ' যুক্ত সুন্দর ইংরেজি বাক্য তৈরি করা হলো
    var bodyStr = "Dear +" + managerName + " Bhai,\n\n" +
                  "I hope you are doing well. I would like to inform you that " + dateTextFirstLine + ", I was unable to attend work due to " + reason + ". My condition required complete rest, which was necessary for my recovery.\n\n" +
                  "Therefore, I sincerely request you to kindly consider my situation and approve my leave for the mentioned date.\n\n" +
                  "ID: " + empId + "\n" +
                  "Name: " + name + "\n" +
                  "Line Manager Name: " + managerName + ".\n" +
                  "Leave Type: " + bodyLeaveType + "\n" +
                  "Leave Date from: " + dateTextDetailLine + "\n" +
                  "Leave Duration: " + duration + ".\n" +
                  "Leave Reliever Name: " + relieverName + "\n" +
                  "Reason for leave: I was unable to attend work due to " + reason + ".";

    document.getElementById('outSubject').innerText = subjectStr;
    document.getElementById('outBody').innerText = bodyStr;

    alert("মেইল সফলভাবে তৈরি হয়েছে! নিচে কপি করার বাটন চলে এসেছে।");

    var mailtoUrl = "mailto:" + toEmail + "?cc=" + ccEmails + "&subject=" + encodeURIComponent(subjectStr) + "&body=" + encodeURIComponent(bodyStr);
    window.location.href = mailtoUrl;
}

function copyTxt(elementId) {
    var text = document.getElementById(elementId).innerText;
    var elem = document.createElement("textarea");
    document.body.appendChild(elem);
    elem.value = text;
    elem.select();
    document.execCommand("copy");
    document.body.removeChild(elem);
    alert("কপি হয়েছে!");
}
</script>

</body>
</html>
